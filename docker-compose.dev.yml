services:
  backend:
    build:
      target: dev
    ports:
      - "2345:2345"
    volumes:
      - ./backend:/home/appuser/app

  websocket:
    build:
      target: dev
    ports:
      - "2347:2345"
    volumes:
      - ./backend:/home/appuser/app

  converter:
    build:
      target: dev
    ports:
      - "2346:2345"
    volumes:
      - ./backend:/home/appuser/app

  frontend:
    build:
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./frontend/nginx.dev.conf:/etc/nginx/http.d/default.conf
    environment:
      - NODE_ENV=development

  db:
    ports:
      - "5432:5432"

  test:
    build:
      context: ./backend
      dockerfile: docker/server/Dockerfile
      target: test
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    depends_on:
      - db
    environment:
      - DB_URL=${DB_URL}
    restart: no
    networks:
      - db
    profiles:
      - test
    command: ["-v", "./..."]

networks:
  db:
    internal: false
  rabbitmq:
    internal: false