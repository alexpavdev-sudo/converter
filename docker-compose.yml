version: '3.8'

services:
  redis:
    image: redis:alpine
    restart: always
    networks:
      - redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  backend:
    build:
      context: ./backend
      dockerfile: docker/server/Dockerfile
      target: prod
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    depends_on:
      - db
      - redis
      - converter
    environment:
      - DB_URL=${DB_URL}
      - REDIS_ADDR=redis:6379
      - SESSION_AUTH_KEY=${SESSION_AUTH_KEY}
      - SESSION_ENC_KEY=${SESSION_ENC_KEY}
      - BASIC_AUTH_USER=${BASIC_AUTH_USER}
      - BASIC_AUTH_PW=${BASIC_AUTH_PW}
      - CSRF_KEY=${CSRF_KEY}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:${RABBITMQ_PORT}/
    restart: always
    networks:
      - db
      - redis
      - frontend
      - rabbitmq
    volumes:
      - ${FILE_FOLDER:-../runtime/converter/files}:/home/appuser/files:rw
      - ${FILE_FOLDER_CONVERTED:-../runtime/converter/files_converted}:/home/appuser/files_converted:rw

  websocket:
    build:
      context: ./backend
      dockerfile: docker/ws/Dockerfile
      target: prod
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    depends_on:
      - db
      - redis
    environment:
      - DB_URL=${DB_URL}
      - REDIS_ADDR=redis:6379
      - SESSION_AUTH_KEY=${SESSION_AUTH_KEY}
      - SESSION_ENC_KEY=${SESSION_ENC_KEY}
      - BASIC_AUTH_USER=${BASIC_AUTH_USER}
      - BASIC_AUTH_PW=${BASIC_AUTH_PW}
      - CSRF_KEY=${CSRF_KEY}
    restart: always
    networks:
      - db
      - redis
      - frontend

  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
      - "443:443"
    restart: always
    volumes:
      - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem
      - ./ssl/key.pem:/etc/nginx/ssl/key.pem
    networks:
      - frontend

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - db
    volumes:
      - ${DB_FOLDER:-../runtime/converter/db/postgres}:/var/lib/postgresql/data

  converter:
    deploy:
      mode: replicated
      replicas: ${CONVERTER_REPLICAS}
    build:
      context: ./backend
      dockerfile: docker/converter/Dockerfile
      target: prod
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    depends_on:
      - db
      - redis
      - rabbitmq
    environment:
      - DB_URL=${DB_URL}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:${RABBITMQ_PORT}/
    restart: always
    networks:
      - db
      - rabbitmq
    volumes:
      - ${FILE_FOLDER:-../runtime/converter/files}:/home/appuser/files:rw
      - ${FILE_FOLDER_CONVERTED:-../runtime/converter/files_converted}:/home/appuser/files_converted:rw

  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    restart: always
    networks:
      - rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - ${RABBITMQ_FOLDER}:/var/lib/rabbitmq
    ports:
      - ${RABBITMQ_MGMT_PORT}:15672

networks:
  frontend:
    driver: bridge
  redis:
    driver: bridge
    internal: true
  db:
    driver: bridge
    internal: true
  rabbitmq:
    driver: bridge
    internal: true